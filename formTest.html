
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Test</title>
    <style>
        .msg-success {
            background: #28a745;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <form id="formTest">
        <input type="text" name="name" placeholder="Nama" required>
        <button type="submit">Submit</button>
    </form>
    <div id="msgBox"></div>

    <script>
        document.getElementById('formTest').onsubmit = function(e) {
            e.preventDefault();
            // Tampilkan pesan sukses
            const msgBox = document.getElementById('msgBox');
            msgBox.innerHTML = '<div class="msg-success">Data berhasil Terdaftar!</div>';

            // Redirect setelah 3 detik
            setTimeout(function() {
                window.location.href = 'index.html';  // Ganti dengan link yang sesuai
            }, 3000);  // 3 detik
        };
    </script>
</body>
</html>
