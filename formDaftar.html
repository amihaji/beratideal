<!DOCTYPE html>
<html class="wide wow-animation" lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <title>Gaya Hidup Sehat dan Aktif | Cara menghitung berat badan ideal</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/style.css">
    <style>.ie-panel{display: none;background: #212121;padding: 10px 0;box-shadow: 3px 3px 5px 0 rgba(0,0,0,.3);clear: both;text-align:center;position: relative;z-index: 1;} html.ie-10 .ie-panel, html.lt-ie-10 .ie-panel {display: block;}</style>
  </head>
  <body>
    <div class="container mt-5 mb-5">
      <div class="card shadow" style="max-width:600px;margin:auto;">
        <div class="card-body">
          <div class="mb-4">
            <div class="progress" style="height: 20px;">
              <div id="progressBar" class="progress-bar bg-success" role="progressbar" style="width:25%;">Step 1 of 4</div>
            </div>
          </div>
          <form id="multiStepForm" enctype="multipart/form-data">
            <!-- Step 1: Personal Data -->
            <div class="form-step" id="step1">
              <h4>Data Pribadi</h4>
              <div class="form-group">
                <label>Nama:</label>
                <input type="text" class="form-control" name="nama" required>
              </div>
              <div class="form-group">
                <label>Tgl Lahir:</label>
                <input type="date" class="form-control" name="tgl_lahir" required>
              </div>
              <div class="form-group">
                <label>Jenis Kelamin:</label>
                <select class="form-control" name="jenis_kelamin" required>
                  <option value="">Pilih</option>
                  <option value="Pria">Pria</option>
                  <option value="Wanita">Wanita</option>
                </select>
              </div>
              <div class="form-group">
                <label>Email:</label>
                <input type="email" class="form-control" name="email" required>
              </div>
              <div class="form-group">
                <label>Tlp:</label>
                <input type="tel" class="form-control" name="tlp" required>
              </div>
              <div class="form-group">
                <label>Alamat:</label>
                <input type="text" class="form-control" name="alamat" required>
              </div>
              <div class="form-group">
                <label>Kota:</label>
                <input type="text" class="form-control" name="kota" required>
              </div>
              <div class="form-group">
                <label>Propinsi:</label>
                <input type="text" class="form-control" name="propinsi" required>
              </div>
              <button type="button" class="btn btn-primary next-step">Lanjut</button>
            </div>
            <!-- Step 2: Order Data -->
            <div class="form-step d-none" id="step2">
              <h4>Data Pesanan</h4>
              <div class="form-group">
                <label>Pilih Program:</label>
                <select class="form-control" id="programSelect" name="program" required>
                  <option value="">Pilih</option>
                  <option value="10">10 Hari</option>
                  <option value="21">21 Hari</option>
                  <option value="90">3 Bulan</option>
                </select>
              </div>
              <div id="programDetail" class="mb-3"></div>
              <div class="form-group">
                <label>Ekspedisi:</label>
                <select class="form-control" id="ongkirSelect" name="ongkir" required>
                  <option value="">Pilih</option>
                  <option value="Gojek">Gojek</option>
                  <option value="Gosend">Gosend</option>
                  <option value="Gratis">Gratis</option>
                </select>
              </div>
              <div class="form-group">
                <label>By Kirim:</label>
                <input type="text" class="form-control" id="byKirim" name="by_kirim" readonly>
              </div>
              <div class="form-group">
                <label>Total Biaya:</label>
                <input type="text" class="form-control" id="totalBiaya" name="total_biaya" readonly>
              </div>
              <button type="button" class="btn btn-secondary prev-step">Kembali</button>
              <button type="button" class="btn btn-primary next-step">Lanjut</button>
            </div>
            <!-- Step 3: Checkout -->
            <div class="form-step d-none" id="step3">
              <h4>Checkout</h4>
              <p>Pastikan data Anda sudah benar sebelum submit.</p>
              <button type="button" class="btn btn-secondary prev-step">Kembali</button>
              <button type="button" class="btn btn-primary next-step">Submit</button>
            </div>
            <!-- Step 4: Confirmation -->
            <div class="form-step d-none" id="step4">
              <h4>Konfirmasi Pembayaran</h4>
              <div class="form-group">
                <label>Upload Bukti Transfer:</label>
                <input type="file" class="form-control" name="bukti_transfer" accept="image/*" required>
              </div>
              <div class="form-group">
                <label>Link File Upload (otomatis):</label>
                <input type="text" class="form-control" name="link_file_upload" id="linkFileUpload" readonly>
              </div>
              <button type="button" class="btn btn-secondary prev-step">Kembali</button>
              <button type="submit" class="btn btn-success">Kirim</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script>
      // Multi-step logic dengan progress bar
      const steps = document.querySelectorAll('.form-step');
      const progressBar = document.getElementById('progressBar');
      let currentStep = 0;
      function showStep(idx) {
        steps.forEach((step, i) => {
          step.classList.toggle('d-none', i !== idx);
        });
        const percent = ((idx+1)/steps.length)*100;
        progressBar.style.width = percent + '%';
        progressBar.textContent = `Step ${idx+1} of 4`;
      }
      document.querySelectorAll('.next-step').forEach(btn => {
        btn.onclick = () => {
          if (currentStep < steps.length - 1) {
            currentStep++;
            showStep(currentStep);
          }
        };
      });
      document.querySelectorAll('.prev-step').forEach(btn => {
        btn.onclick = () => {
          if (currentStep > 0) {
            currentStep--;
            showStep(currentStep);
          }
        };
      });
      showStep(currentStep);
      // Program selection logic
      const programSelect = document.getElementById('programSelect');
      const programDetail = document.getElementById('programDetail');
      const totalBiaya = document.getElementById('totalBiaya');
      const hargaMap = { '10': 650000, '21': 1000000, '90': 1000000 };
      const imgMap = {
        '10': 'images/Mega-Trend1.webp',
        '21': 'images/Mega-Trend2.webp',
        '90': 'images/Mega-Trend3.webp'
      };
      const ongkirMap    = { 'Gojek': 20000, 'Gosend': 30000, 'Gratis': 0 };
      const byKirim      = document.getElementById('byKirim');
      const ongkirSelect = document.getElementById('ongkirSelect');
      function updateTotal() {
        const programVal = programSelect.value;
        const ongkirVal  = ongkirSelect.value;
        const harga      = hargaMap[programVal] || 0;
        const ongkir     = ongkirMap[ongkirVal] || 0;
        byKirim.value    = ongkir;
        totalBiaya.value = harga + ongkir;
      }
      programSelect.onchange = function() {
        const val = programSelect.value;
        if (val && hargaMap[val]) {
          programDetail.innerHTML = `<div><strong>Harga: Rp ${hargaMap[val].toLocaleString()}</strong></div><img src='${imgMap[val]}' alt='Produk' style='max-width:200px;'>`;
        } else {
          programDetail.innerHTML = '';
        }
        updateTotal();
      };
      ongkirSelect.onchange = function() {
        updateTotal();
      };
      // Google Sheets integration (ganti YOUR_SCRIPT_URL dengan URL Web Apps Script Anda)
      document.getElementById('multiStepForm').onsubmit = function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        // Masukkan ID google script disini
        fetch('https://script.google.com/macros/s/AKfycbw8h0f7x3LRsEsFT42Jm59nWHxq0TSg6UN6tLkwts3IwqKgV4wJhdDMBi0cNjH8dZ_R/exec', {
          method: 'POST',
          body: formData
        })
        .then(response => response.json())
        .then(data => {
          if(data.link_file_upload) {
            document.getElementById('linkFileUpload').value = data.link_file_upload;
          }
          alert('Data berhasil dikirim!');
          location.reload();
        })
        .catch(error => {
          alert('Gagal mengirim data.');
        });
      };
    </script>
  </body>
</html>
