<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Pendaftaran</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .form-step { display: none; }
    .form-step.active { display: block; }
    .judul-form {
      background: #003366;
      color: #fff;
      padding: 16px;
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 8px 8px 0 0;
    }
    .msg-error {
      background: #c5c5c5;
      color: #630808;
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .msg-success {
      background: #c5c5c5;
      color: #1737c4;
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .btn-icon { display: flex; align-items: center; gap: 8px; }
    .btn-submit { background-color: #4a4a4a; color: white; }
    .btn-submit:hover { background-color: #c82333; color: white; }
    .form-navigation {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
    }
    .form-group input.uppercase {
      text-transform: uppercase;
    }
    .form-group input.lowercase {
      text-transform: lowercase;
    }
    /* Ensuring vertical buttons on mobile */
    @media (max-width: 767px) {
      .form-navigation .col-12 {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
    }
    /* Add spacing between buttons and messages */
    .form-navigation .btn {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container mt-5 mb-5">
    <div class="card mx-auto" style="max-width:600px">
      <div class="judul-form"><i class="fas fa-dumbbell"></i> Form Pendaftaran</div>
      <div class="card-body">
        <div class="progress mb-3">
          <div id="progressBar" class="progress-bar" role="progressbar" style="width:33%">Step 1 dari 3</div>
        </div>

        <form id="formDaftar">

          <!-- Step 1 -->
          <div class="form-step active" id="step-1">
            <div class="mb-3 font-weight-bold"><i class="fas fa-list"></i> Pilihan Program Anda</div>
            <div class="form-group"><label>Tanggal Daftar</label><input type="text" class="form-control" id="tanggal" readonly></div>
            <div class="form-group"><label>No Pesanan</label><input type="text" class="form-control" id="nomorPesanan" readonly></div>
            <div class="form-group"><label>Program</label>
              <select class="form-control" id="program" required>
                <option value="">-- Pilih Program --</option>
                <option value="10 Hari">10 Hari</option>
                <option value="21 Hari">21 Hari</option>
                <option value="3 Bulan">3 Bulan</option>
              </select>
            </div>
            <div class="form-group"><label>Harga</label><input type="text" class="form-control" id="harga" readonly></div>
            <div id="msgBox1"></div>
            <div class="form-navigation">
              <span></span>
              <div class="col-12 col-md-6 d-flex justify-content-center">
                <button type="button" class="btn btn-primary btn-icon w-100" onclick="nextStep(1)">
                  <i class="fas fa-arrow-right"></i> Lanjut
                </button>
              </div>
            </div>
          </div>

          <!-- Step 2 -->
          <div class="form-step" id="step-2">
            <div class="mb-3 font-weight-bold"><i class="fas fa-truck"></i> Data Pengiriman Produk</div>
            <div class="form-group"><label>Nama</label><input type="text" class="form-control uppercase" id="nama"></div>
            <div class="form-group"><label>Alamat</label><input type="text" class="form-control uppercase" id="alamat"></div>
            <div class="form-group"><label>Telp</label><input type="text" class="form-control" id="telp"></div>
            <div class="form-group"><label>Email</label><input type="email" class="form-control lowercase" id="email"></div>
            <div class="form-group"><label>Kelurahan</label><input type="text" class="form-control uppercase" id="kelurahan"></div>
            <div class="form-group"><label>Kecamatan</label><input type="text" class="form-control uppercase" id="kecamatan"></div>
            <div class="form-group"><label>Kota</label><input type="text" class="form-control uppercase" id="kota"></div>
            <div class="form-group"><label>Propinsi</label><input type="text" class="form-control uppercase" id="propinsi"></div>
            <div id="msgBox2"></div>
            <div class="form-navigation">
              <div class="col-12 col-md-6 d-flex justify-content-center">
                <button type="button" class="btn btn-secondary btn-icon w-100" onclick="prevStep()">
                  <i class="fas fa-arrow-left"></i> Sebelumnya
                </button>
              </div>
              <div class="col-12 col-md-6 d-flex justify-content-center">
                <button type="button" class="btn btn-primary btn-icon w-100" onclick="nextStep(2)">
                  <i class="fas fa-arrow-right"></i> Lanjut
                </button>
              </div>
            </div>
          </div>

          <!-- Step 3 -->
          <div class="form-step" id="step-3">
            <div class="mb-3 font-weight-bold"><i class="fas fa-credit-card"></i> Sistem Pembayaran</div>
            <div class="form-group"><label>Sistem Pembayaran</label>
              <select class="form-control" id="pembayaran" onchange="updatePembayaran()">
                <option value="">-- Pilih Pembayaran --</option>
                <option value="BCA">Transfer ke BCA</option>
                <option value="Mandiri">Transfer ke Mandiri</option>
                <option value="QR">QR Code</option>
              </select>
            </div>
            <div class="form-group"><label>Nama Penerima</label><input type="text" class="form-control" id="namaPenerima" readonly></div>
            <div class="form-group"><label>AC Penerima</label><input type="text" class="form-control" id="acPenerima" readonly></div>
            <div class="form-group"><label>Nominal Transfer</label><input type="text" class="form-control" id="nominal" readonly></div>
            <div id="qrisImage" class="text-center mb-2"></div>
            <button type="button" id="btnDownloadQR" class="btn btn-info btn-icon" style="display:none" onclick="window.open('images/QRIS CLUB KITA.jpeg', '_blank')">
              <i class="fas fa-download"></i> Download QRIS
            </button>
            <div id="msgBox3"></div>

            <!-- Form Navigation -->
            <div class="row">
              <div class="col-12 col-md-6 d-flex justify-content-center">
                <button type="button" class="btn btn-secondary btn-icon w-100" id="btnPrev" onclick="prevStep()">
                  <i class="fas fa-arrow-left"></i> Sebelumnya
                </button>
              </div>
              <div class="col-12 col-md-6 d-flex justify-content-center">
                <button type="submit" class="btn btn-submit btn-icon w-100" id="btnSubmit">
                  <i class="fas fa-paper-plane"></i> Submit
                </button>
              </div>
            </div>
          </div>

        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="js/scriptDaftar.js" defer></script>
</body>
</html>
