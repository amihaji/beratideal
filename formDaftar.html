<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORM PENDAFTARAN</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    .form-step { display: none; }
    .form-step.active { display: block; }
    .judul-form {
      background: #003366;
      color: #fff;
      padding: 16px;
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 8px 8px 0 0;
    }
    .msg-error {
      background: #c5c5c5;
      color: #630808;
      padding: 7px 10px;
      border-radius: 5px;
      margin: 10px 0;
      font-size: 0.9rem;
    }
    .msg-success {
      background: #c5c5c5;
      color: #1737c4;
      padding: 7px 10px;
      border-radius: 5px;
      margin: 10px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container mt-5 mb-5">
    <div class="card mx-auto" style="max-width:600px">
      <div class="judul-form">Form Pendaftaran</div>
      <div class="card-body">

        <div class="progress mb-3">
          <div id="progressBar" class="progress-bar" role="progressbar" style="width:33%">Step 1 dari 3</div>
        </div>

        <form id="formDaftar">
          <div id="msgBox"></div>

          <!-- Step 1 -->
          <div class="form-step active" id="step-1">
            <div class="form-group">
              <label>Tanggal Daftar</label>
              <input type="text" class="form-control" id="tanggal" readonly>
            </div>
            <div class="form-group">
              <label>No Pesanan</label>
              <input type="text" class="form-control" id="nomorPesanan" readonly>
            </div>
            <div class="form-group">
              <label>Program</label>
              <select class="form-control" id="program" required>
                <option value="">-- Pilih Program --</option>
                <option value="10 Hari">10 Hari</option>
                <option value="21 Hari">21 Hari</option>
                <option value="3 Bulan">3 Bulan</option>
              </select>
            </div>
            <div class="form-group">
              <label>Harga</label>
              <input type="text" class="form-control" id="harga" readonly>
            </div>
            <button type="button" class="btn btn-primary float-right" onclick="nextStep()">Lanjut</button>
          </div>

          <!-- Step 2 -->
          <div class="form-step" id="step-2">
            <div class="form-group"><label>Nama</label><input type="text" class="form-control" id="nama"></div>
            <div class="form-group"><label>Alamat</label><input type="text" class="form-control" id="alamat"></div>
            <div class="form-group"><label>Telp</label><input type="text" class="form-control" id="telp"></div>
            <div class="form-group"><label>Email</label><input type="email" class="form-control" id="email"></div>
            <div class="form-group"><label>Kelurahan</label><input type="text" class="form-control" id="kelurahan"></div>
            <div class="form-group"><label>Kecamatan</label><input type="text" class="form-control" id="kecamatan"></div>
            <div class="form-group"><label>Kota</label><input type="text" class="form-control" id="kota"></div>
            <div class="form-group"><label>Propinsi</label><input type="text" class="form-control" id="propinsi"></div>
            <button type="button" class="btn btn-secondary" onclick="prevStep()">Sebelumnya</button>
            <button type="button" class="btn btn-primary float-right" onclick="nextStep()">Lanjut</button>
          </div>

          <!-- Step 3 -->
          <div class="form-step" id="step-3">
            <div class="form-group">
              <label>Sistem Pembayaran</label>
              <select class="form-control" id="pembayaran" onchange="updatePembayaran()">
                <option value="">-- Pilih Pembayaran --</option>
                <option value="BCA">Transfer ke BCA</option>
                <option value="Mandiri">Transfer ke Mandiri</option>
                <option value="QR">QR Code</option>
              </select>
            </div>
            <div id="dataRekening"></div>
            <div class="form-group">
              <label>Nominal Transfer</label>
              <input type="text" class="form-control" id="nominal" readonly>
            </div>
            <button type="button" class="btn btn-secondary" onclick="prevStep()">Sebelumnya</button>
            <button type="submit" class="btn btn-success float-right">Submit</button>
          </div>

        </form>

      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script>
    let currentStep = 0;
    const steps = document.querySelectorAll('.form-step');
    const progress = document.getElementById('progressBar');

    document.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      const pad = n => n.toString().padStart(2, '0');
      const tanggal = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`;
      document.getElementById('tanggal').value = tanggal;

      const noPesanan = `PS-${pad(now.getDate())}${pad(now.getMonth()+1)}${now.getFullYear().toString().slice(-2)}-${Math.floor(1000 + Math.random()*9000)}`;
      document.getElementById('nomorPesanan').value = noPesanan;
    });

    document.getElementById('program').addEventListener('change', e => {
      const hargaMap = {"10 Hari": 600000, "21 Hari": 1200000, "3 Bulan": 3200000};
      const harga = hargaMap[e.target.value] || '';
      document.getElementById('harga').value = harga;
      generateNominal();
    });

    function nextStep() {
      if (currentStep < steps.length - 1) {
        steps[currentStep].classList.remove('active');
        currentStep++;
        steps[currentStep].classList.add('active');
        updateProgress();
      }
    }

    function prevStep() {
      if (currentStep > 0) {
        steps[currentStep].classList.remove('active');
        currentStep--;
        steps[currentStep].classList.add('active');
        updateProgress();
      }
    }

    function updateProgress() {
      progress.style.width = `${(currentStep+1)/steps.length*100}%`;
      progress.textContent = `Step ${currentStep+1} dari 3`;
    }

    function updatePembayaran() {
      const value = document.getElementById('pembayaran').value;
      let data = '';
      if (value === 'BCA') {
        data = `<p>Nama Penerima: Hesty Husain<br>AC: bca123456789</p>`;
      } else if (value === 'Mandiri') {
        data = `<p>Nama Penerima: Hesty Husain<br>AC: mandiri123456789</p>`;
      } else if (value === 'QR') {
        data = `<p>Nama Penerima: Hesty Husain<br>AC: QR123456789<br><img src="img/qr.png" width="150"></p>`;
      }
      document.getElementById('dataRekening').innerHTML = data;
    }

    function generateNominal() {
      const harga = parseInt(document.getElementById('harga').value);
      if (!isNaN(harga)) {
        const random = Math.floor(Math.random()*900)+100;
        document.getElementById('nominal').value = harga + random;
      }
    }

    document.getElementById('formDaftar').addEventListener('submit', async function(e) {
      e.preventDefault();

      const data = {
        tanggal: document.getElementById('tanggal').value,
        nomorPesanan: document.getElementById('nomorPesanan').value,
        program: document.getElementById('program').value,
        harga: document.getElementById('harga').value,
        nama: document.getElementById('nama').value,
        alamat: document.getElementById('alamat').value,
        telp: document.getElementById('telp').value,
        email: document.getElementById('email').value,
        kelurahan: document.getElementById('kelurahan').value,
        kecamatan: document.getElementById('kecamatan').value,
        kota: document.getElementById('kota').value,
        propinsi: document.getElementById('propinsi').value,
        pembayaran: document.getElementById('pembayaran').value,
        namaPenerima: "Hesty Husain",
        acPenerima: document.getElementById('dataRekening').innerText.split('\n')[1],
        nominal: document.getElementById('nominal').value
      };

      const msgBox = document.getElementById('msgBox');
      msgBox.innerHTML = '';

      try {
        // ID google script
        const res = await fetch('https://script.google.com/macros/s/AKfycbzhWSDlJHD2b8nyZf8pp0y_MR50JgPQpy_b2wYBVcNxTpIJ1wnJvvQKE3CY4Q7jXCur/exec', {
          method: 'POST',
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.status === 'success') {
          msgBox.innerHTML = '<div class="msg-success">Pendaftaran berhasil, lihat konfirmasinya di WA dan Email anda!</div>';
        } else {
          msgBox.innerHTML = '<div class="msg-error">Terjadi kesalahan: ' + result.message + '</div>';
        }
      } catch (err) {
        msgBox.innerHTML = '<div class="msg-error">Gagal mengirim data.</div>';
      }
    });
  </script>
</body>
</html>
