
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Pendaftaran | Berat Ideal</title>
  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .form-step { display: none; }
    .form-step.active { display: block; }
    .msg-error {
      background: #d9534f;
      color: #fff;
      padding: 7px 10px;
      border-radius: 5px;
      margin: 10px 0;
      font-size: 0.8rem;
    }
    .msg-success {
      background: #0037ce;
      color: #fff;
      padding: 7px 10px;
      border-radius: 5px;
      margin: 10px 0;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
<div class="container mt-4 mb-4">
  <div class="card mx-auto" style="max-width:600px;">
    <div class="card-header text-white bg-primary"><strong>Form Pendaftaran</strong></div>
    <div class="card-body">
      <div class="progress mb-3">
        <div id="progressBar" class="progress-bar" style="width:33%">Step 1 dari 3</div>
      </div>

      <form id="formDaftar" autocomplete="off">
        <div id="msgBox"></div>

        <div class="form-step active" id="step1">
          <h5>Data Pribadi</h5>
          <input type="date" name="tgl_daftar" id="tgl_daftar" class="form-control mb-2" readonly>
          <input type="text" name="no_pesanan" id="no_pesanan" class="form-control mb-2" readonly placeholder="No Pesanan">
          <input type="text" name="nama" class="form-control mb-2" placeholder="Nama" required>
          <input type="date" name="tgl_lahir" class="form-control mb-2" required>
          <select name="jenis_kelamin" class="form-control mb-2" required>
            <option value="">Pilih Jenis Kelamin</option>
            <option value="Pria">Pria</option>
            <option value="Wanita">Wanita</option>
          </select>
          <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
          <input type="tel" name="tlp" id="tlp" class="form-control mb-2" placeholder="No Telp" required>
          <input type="text" name="alamat" class="form-control mb-2" placeholder="Alamat" required>
          <input type="text" name="kecamatan" class="form-control mb-2" placeholder="Kecamatan" required>
          <input type="text" name="kelurahan" class="form-control mb-2" placeholder="Kelurahan" required>
          <input type="text" name="kota" class="form-control mb-2" placeholder="Kota" required>
          <input type="text" name="propinsi" class="form-control mb-2" placeholder="Propinsi" required>
          <button type="button" id="btnNext1" class="btn btn-primary mt-2 float-end">Lanjut</button>
        </div>

        <div class="form-step" id="step2">
          <h5>Data Pesanan</h5>
          <select name="program" id="program" class="form-control mb-2" required>
            <option value="">Pilih Program</option>
            <option value="10">10 Hari</option>
            <option value="21">21 Hari</option>
            <option value="90">3 Bulan</option>
          </select>
          <input type="text" name="harga_program" id="harga_program" class="form-control mb-2" readonly>
          <select name="ongkir" id="ongkir" class="form-control mb-2" required>
            <option value="">Pilih Ekspedisi</option>
            <option value="Gojek">Gojek</option>
            <option value="Gosend">Gosend</option>
            <option value="POS">POS</option>
            <option value="Gratis">Gratis</option>
          </select>
          <input type="text" name="by_kirim" id="by_kirim" class="form-control mb-2" readonly>
          <input type="text" name="total_biaya" id="total_biaya" class="form-control mb-2" readonly>
          <button type="button" id="btnPrev2" class="btn btn-secondary">Sebelumnya</button>
          <button type="button" id="btnNext2" class="btn btn-primary float-end">Lanjut</button>
        </div>

        <div class="form-step" id="step3">
          <h5>Checkout</h5>
          <input type="text" name="bank_asal" id="bank_asal" class="form-control mb-2" placeholder="Bank Asal" required>
          <input type="text" name="norek_asal" id="norek_asal" class="form-control mb-2" placeholder="No Rekening Asal" required>
          <input type="text" name="bank_tujuan" id="bank_tujuan" class="form-control mb-2" placeholder="Bank Tujuan" required>
          <input type="text" name="norek_tujuan" id="norek_tujuan" class="form-control mb-2" placeholder="No Rekening Tujuan" required>
          <input type="text" name="transfer_dana" id="transfer_dana" class="form-control mb-2" readonly>
          <button type="button" id="btnPrev3" class="btn btn-secondary">Sebelumnya</button>
          <button type="submit" class="btn btn-success float-end">Submit</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
let currentStep = 0;
const steps = document.querySelectorAll(".form-step");
function showStep(step) {
  steps.forEach((s, i) => s.classList.toggle("active", i === step));
  document.getElementById("progressBar").style.width = ((step+1)/3*100) + '%';
  document.getElementById("progressBar").textContent = `Step ${step+1} dari 3`;
}
function showMsg(msg, type) {
  const box = document.querySelector(".form-step.active #msgBox");
  box.innerHTML = msg ? `<div class="msg-${type}">${msg}</div>` : "";
}
function generateNoPesanan() {
  const now = new Date();
  return 'PS' + now.toISOString().slice(2,10).replace(/-/g,'') + '-' + Math.floor(Math.random()*9000+1000);
}
document.getElementById("tgl_daftar").valueAsDate = new Date();
document.getElementById("no_pesanan").value = generateNoPesanan();

const hargaMap = { '10': 700000, '21': 2100000, '90': 7000000 };
document.getElementById("program").onchange = updateTotal;
document.getElementById("ongkir").onchange = updateTotal;

function updateTotal() {
  const program = document.getElementById("program").value;
  const harga = hargaMap[program] || 0;
  const ekspedisi = { 'Gojek':20000, 'Gosend':30000, 'POS':40000, 'Gratis':0 };
  const ongkir = ekspedisi[document.getElementById("ongkir").value] || 0;
  const tlp = document.getElementById("tlp").value;
  const last3 = parseInt(tlp.slice(-3).padStart(3,'0')) || 0;
  const total = harga + ongkir + last3;
  document.getElementById("harga_program").value = harga.toLocaleString("id-ID");
  document.getElementById("harga_program").setAttribute("data-raw", harga);
  document.getElementById("by_kirim").value = ongkir.toLocaleString("id-ID");
  document.getElementById("by_kirim").setAttribute("data-raw", ongkir);
  document.getElementById("total_biaya").value = total.toLocaleString("id-ID");
  document.getElementById("total_biaya").setAttribute("data-raw", total);
  document.getElementById("transfer_dana").value = total.toLocaleString("id-ID");
  document.getElementById("transfer_dana").setAttribute("data-raw", total);
}

document.getElementById("btnNext1").onclick = () => { showStep(1); currentStep = 1; updateTotal(); };
document.getElementById("btnPrev2").onclick = () => { showStep(0); currentStep = 0; };
document.getElementById("btnNext2").onclick = () => { showStep(2); currentStep = 2; };
document.getElementById("btnPrev3").onclick = () => { showStep(1); currentStep = 1; };

document.getElementById("formDaftar").onsubmit = async function(e) {
  e.preventDefault();
  let msg = [];
  if (!document.getElementById("bank_asal").value.trim()) msg.push("Bank Asal wajib diisi.");
  if (!document.getElementById("norek_asal").value.trim()) msg.push("No Rekening Asal wajib diisi.");
  if (!document.getElementById("bank_tujuan").value.trim()) msg.push("Bank Tujuan wajib diisi.");
  if (!document.getElementById("norek_tujuan").value.trim()) msg.push("No Rekening Tujuan wajib diisi.");
  if (msg.length) { showMsg(msg.join("<br>"), "error"); return; }

  const form = document.getElementById("formDaftar");
  const inputs = form.querySelectorAll("input, select");
  const params = new URLSearchParams();
  inputs.forEach(input => {
    if (input.name) {
      if (["by_kirim", "total_biaya", "transfer_dana", "harga_program"].includes(input.name)) {
        params.append(input.name, input.getAttribute("data-raw") || "0");
      } else {
        params.append(input.name, input.value);
      }
    }
  });

  try {
    const response = await fetch('https://script.google.com/macros/s/AKfycbzJ0HYpqWn4bvSwBEcOyJkAn6v1l4JRSBVrZuM5ehRSnIH5FGXoOKx5dkTGSzYeYN0y/exec', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params
    });
    const result = await response.text();
    if (result.includes("success")) {
      showMsg("Data berhasil disimpan ke Google Sheet!", "success");
      form.reset(); showStep(0); currentStep = 0;
      document.getElementById("tgl_daftar").valueAsDate = new Date();
      document.getElementById("no_pesanan").value = generateNoPesanan();
    } else {
      showMsg("Gagal menyimpan data: " + result, "error");
    }
  } catch (err) {
    showMsg("Terjadi error: " + err.message, "error");
  }
}
</script>
</body>
</html>
