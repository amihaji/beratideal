<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Konfirmasi Pembayaran</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="container mt-5 mb-5">
    <div class="card mx-auto shadow" style="max-width: 600px;">
      <div class="card-header text-white bg-primary">
        <h5 class="mb-0"><i class="fas fa-credit-card"></i> Konfirmasi Pembayaran</h5>
      </div>
      <div class="card-body">
        <form id="formBayar">
          <!-- Informasi Program -->
          <div class="mb-4">
            <h6><i class="fas fa-list"></i> Program Anda</h6>
            <div class="form-group">
              <label>Tanggal Daftar</label>
              <input type="text" class="form-control" id="tanggal" readonly />
            </div>
            <div class="form-group">
              <label>No Pesanan</label>
              <input type="text" class="form-control" id="nomorPesanan" readonly />
            </div>
            <div class="form-group">
              <label>Program</label>
              <input type="text" class="form-control" id="program" readonly />
            </div>
          </div>

          <!-- Data Pengiriman -->
          <div class="mb-4">
            <h6><i class="fas fa-truck"></i> Data Pengiriman</h6>
            <div class="form-group"><label>Nama</label>      <input type="text"  class="form-control" id="nama" readonly /></div>
            <div class="form-group"><label>Alamat</label>    <input type="text"  class="form-control" id="alamat" readonly /></div>
            <div class="form-group"><label>Telp</label>      <input type="text"  class="form-control" id="telp" readonly /></div>
            <div class="form-group"><label>Email</label>     <input type="email" class="form-control" id="email" readonly /></div>
            <div class="form-group"><label>Kelurahan</label> <input type="text"  class="form-control" id="kelurahan" readonly /></div>
            <div class="form-group"><label>Kecamatan</label> <input type="text"  class="form-control" id="kecamatan" readonly /></div>
            <div class="form-group"><label>Kota</label>      <input type="text"  class="form-control" id="kota" readonly /></div>
            <div class="form-group"><label>Propinsi</label>  <input type="text"  class="form-control" id="propinsi" readonly /></div>
          </div>

          <!-- Informasi Pembayaran -->
          <div class="mb-4">
            <h6><i class="fas fa-money-bill-wave"></i> Informasi Pembayaran</h6>
            <div class="form-group"><label>Metode</label>           <input type="text" class="form-control" id="sistemBayar" readonly /></div>
            <div class="form-group"><label>Nama Penerima</label>    <input type="text" class="form-control" id="namaPenerima" readonly /></div>
            <div class="form-group"><label>AC Penerima</label>      <input type="text" class="form-control" id="acPenerima" readonly /></div>
            <div class="form-group"><label>Nominal Transfer</label> <input type="text" class="form-control" id="nominal" readonly /></div>
          </div>

          <!-- Upload Bukti -->
          <div class="mb-4">
            <label><i class="fas fa-image"></i> Upload Bukti Transfer</label>
            <input type="file" class="form-control-file" id="buktiTransfer" accept="image/*" required />
            <div class="mt-2" id="preview"></div>
          </div>

          <!-- Tombol Konfirmasi -->
          <div id="formMessage" class="mt-3"></div>
          <div class="text-center">
            <button type="submit" class="btn btn-success w-100" id="btnKonfirmasi">
              <i class="fas fa-paper-plane"></i> Konfirmasi Pembayaran
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Script -->
  <script>
  // ******************************************** 
  // Memanggail data inputan ke dalam form bayar
  // ********************************************
  document.addEventListener('DOMContentLoaded', function () {
    const params = new URLSearchParams(window.location.search);
    const noPesanan = params.get("noPesanan");

    if (!noPesanan) {
      displayMessage('error', 'Data tidak ditemukan. Silakan daftar ulang.');
      return;
    }

    // Ambil data peserta dari server
    fetch("https://script.google.com/macros/s/AKfycbyL0IyUTV6BINqiN3GFgp4kKZwwuesND_D4e1EYjGZo9OQ6rdExicXyASsK22xubpCu/exec?noPesanan=" + noPesanan)
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          displayMessage('error', 'Data tidak ditemukan di server.');
          return;
        }

        const mapping = {
          tanggal: "tanggal",
          noPesanan: "nomorPesanan",
          program: "program",
          harga: "harga",
          nama: "nama",
          alamat: "alamat",
          telp: "telp",
          email: "email",
          kelurahan: "kelurahan",
          kecamatan: "kecamatan",
          kota: "kota",
          propinsi: "propinsi",
          pembayaran: "sistemBayar",
          namaPenerima: "namaPenerima",
          acPenerima: "acPenerima",
          nominal: "nominal"
        };

        Object.entries(mapping).forEach(([key, id]) => {
          const el = document.getElementById(id);
          if (el) el.value = data[key] || "";
        });
      });

    // Preview gambar
    document.getElementById("buktiTransfer").addEventListener("change", function () {
      const file = this.files[0];
      const preview = document.getElementById("preview");
      preview.innerHTML = "";

      if (file && file.type.startsWith("image/")) {
        const reader = new FileReader();
        reader.onload = function (e) {
          preview.innerHTML = `<img src="${e.target.result}" class="img-fluid rounded border" style="max-height:250px;" alt="Preview">`;
        };
        reader.readAsDataURL(file);
      }
    });

    // Submit form
    document.getElementById("formBayar").addEventListener("submit", function (e) {
      e.preventDefault();
      const fileInput = document.getElementById("buktiTransfer");
      const file = fileInput.files[0];

      if (!file) {
        displayMessage("error", "Silakan upload bukti transfer terlebih dahulu.");
        return;
      }

      // Konversi file ke base64
      const reader = new FileReader();
      reader.onload = function (event) {
        const base64 = event.target.result.split(",")[1]; // ambil isi base64-nya

        const payload = {
          noPesanan: noPesanan,
          fileName: file.name,
          mimeType: file.type,
          base64: base64
        };

        // Kirim ke Apps Script
        fetch("https://script.google.com/macros/s/AKfycbyL0IyUTV6BINqiN3GFgp4kKZwwuesND_D4e1EYjGZo9OQ6rdExicXyASsK22xubpCu/exec", {
          method: "POST",
          body: JSON.stringify(payload),
          headers: {
            "Content-Type": "application/json"
          }
        })
        .then(res => res.json())
        .then(res => {
          if (res.success) {
            displayMessage("success", "Konfirmasi pembayaran berhasil! ✅");
          } else {
            displayMessage("error", "Gagal menyimpan data: " + (res.message || "Unknown error"));
          }
        })
        .catch(() => {
          displayMessage("error", "Terjadi kesalahan koneksi saat mengirim data.");
        });
      };
      reader.readAsDataURL(file);
    });
  });

  // *********************************************
  // Menampilkan pesan hasil ke layar (HTML + CSS)
  // *********************************************
  function displayMessage(type, message) {
    const msgBox = document.getElementById("formMessage");
    msgBox.innerHTML = `<div class="${type === 'error' ? 'msg-error' : 'msg-success'}">${message}</div>`;
  }
  
  // ************************************** 
  // Fungsi untuk menampilkan pesan di form
  // **************************************
  function displayMessage(type, message) {
    const msgBox = document.createElement('div');
    msgBox.className = type === 'error' ? 'msg-error' : 'msg-success';
    msgBox.innerHTML = message;
    document.querySelector('#formBayar').appendChild(msgBox);
  }

  // **********************************************************
  // Fungsi untuk upload bukti transfer dan update status bayar
  // **********************************************************
  function uploadBuktiTransfer(bukti, noPesanan) {
    const formData = new FormData();
    formData.append('file', bukti);

    // Kirim ke server untuk upload ke Folder Google Drive
    fetch('https://script.google.com/macros/s/AKfycbyL0IyUTV6BINqiN3GFgp4kKZwwuesND_D4e1EYjGZo9OQ6rdExicXyASsK22xubpCu/exec', {
      method: 'POST',
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        const fileLink = data.fileLink; // Link file yang diupload

        // Update status bayar di Sheet
        updateStatusBayar(noPesanan, fileLink);
      } else {
        displayMessage('error', 'Gagal mengupload bukti transfer.');
      }
    });
  }

  // ******************************************
  // Fungsi untuk update status bayar di Sheet
  // ******************************************
  function updateStatusBayar(noPesanan, fileLink) {
    const payload = { noPesanan, fileLink };
    fetch('https://script.google.com/macros/s/AKfycbyL0IyUTV6BINqiN3GFgp4kKZwwuesND_D4e1EYjGZo9OQ6rdExicXyASsK22xubpCu/exec', {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: { 'Content-Type': 'application/json' }
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        displayMessage('success', 'Pembayaran berhasil dikonfirmasi!');
      } else {
        displayMessage('error', 'Gagal mengupdate status pembayaran.');
      }
    });
  }
</script>
</body>
</html>
