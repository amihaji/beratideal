<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Pendaftaran</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styleFrmDaftar.css">
</head>

<body>
  <div class="container mt-5 mb-5">
    <div class="card mx-auto" style="max-width:600px">
      <div class="judul-form"><i class="fas fa-credit-card "></i>Form Konfirmasi Pembayaran</div>
    
        <form id="formBayar">
            <div class="form-group">
              <div class="mb-3 font-weight-bold"><i class="fas fa-list"></i> Pilihan Program Anda</div>
              <label>Tanggal Daftar</label>       <input type="text"  id="tanggal" readonly></div>
              <label>No Pesanan</label>           <input type="text"  id="nomorPesanan" readonly></div>
              <label>Program pilihan anda</label> <input type="text"  id="program" readonly></div>
                   
              <div class="mb-3 font-weight-bold"><i class="fas fa-truck"></i> Data Pengiriman Produk</div>
              <label>Nama</label>                 <input type="text"  id="nama" readonly>></input>
              <label>Alamat</label>               <input type="text"  id="alamat" readonly>></input>
              <label>Telp</label>                 <input type="text"  id="telp" readonly>></input>
              <label>Email</label>                <input type="email" id="email" readonly>></input>
              <label>Kelurahan</label>            <input type="text"  id="kelurahan" readonly></input>
              <label>Kecamatan</label>            <input type="text"  id="kecamatan" readonly></input>
              <label>Kota</label>                 <input type="text"  id="kota" readonly>></input>
              <label>Propinsi</label>             <input type="text"  id="propinsi" readonly>></input>
          
              <div class="mb-3 font-weight-bold"><i class="fas fa-credit-card"></i> Sistem Pembayaran</div>
              <label>Metode Pembayaran</label>   <input type="text"  id="sistemBayar" readonly></input>
              <label>Nama Penerima</label>       <input type="text"  id="namaPenerima" readonly></input>
              <label>AC Penerima</label>         <input type="text"  id="acPenerima" readonly></input>
              <label>Nominal Transfer</label>    <input type="text"  id="nominal" readonly></input
                          
              <button type="button" class="btn btn-upload-bukti btn-icon" id="btnUploadBukti">
                <i class="fas fa-upload"></i> Upload Bukti Transfer
              </button>
              <button type="submit" class="btn btn-submit btn-icon w-100" id="btnKonfirmasi">
                <i class="fas fa-paper-plane"></i> Konfirmasi
              </button>
            </div>
        </form>    

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
  <script src="js/jsFrmDaftar.js"></script>
</body>
</html>
